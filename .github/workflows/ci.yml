name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Build
      run: go build ./...
    - name: Vet
      run: go vet ./...
    - name: Test
      run: go test ./... -count=1 -timeout 180s
    - name: Benchmark
      run: go test ./agentcore -bench=. -benchtime=10x -run=^$
